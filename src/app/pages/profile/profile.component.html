<div class="profile-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>User Profile</mat-card-title>
            <mat-form-field appearance="outline" style="margin-left: auto;">
              <mat-label>Select Profile</mat-label>
              <mat-select [value]="selectedIndex" (selectionChange)="reload($event.value)">
                <mat-option *ngFor="let profile of profileObject; let i = index" [value]="i">
                  {{profile.id}}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </mat-card-header>
  
      <mat-card-content>
        <div class="profile-info">
          <mat-icon class="avatar" color="accent">person</mat-icon>
  
          <div class="user-details">
            <h3 class="user-name">{{ profileObject[selectedIndex].user_name }}</h3>
  
            <div class="user-email">
              <mat-icon>email</mat-icon>
              <span>{{ profileObject[selectedIndex].email }}</span>
            </div>
  
            <div class="user-address">
              <mat-icon>location_on</mat-icon>
              <span>{{ profileObject[selectedIndex].address }}</span>
            </div>
          </div>
        </div>
  
        <h2 class="section-title">Cím adatok</h2>
        <table mat-table [dataSource]="[profileObject[selectedIndex]]" class="mat-elevation-z2 address-table">
          <ng-container matColumnDef="label">
            <th mat-header-cell *matHeaderCellDef>Mező</th>
            <td mat-cell *matCellDef="let element">Cím</td>
          </ng-container>
  
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef>Érték</th>
            <td mat-cell *matCellDef="let element">{{ element.address }}</td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="['label', 'value']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['label', 'value']"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
