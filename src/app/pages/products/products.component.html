  <mat-card-header>
    <mat-card-title>Termékek</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <!--<div class="input-group">
      <mat-form-field appearance="outline" class="product-input">
        <mat-label>Termék neve</mat-label>
        <input matInput [(ngModel)]="newProduct.name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="product-input">
        <mat-label>Kategória</mat-label>
        <input matInput [(ngModel)]="newProduct.category" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="product-input">
        <mat-label>Lejárati dátum</mat-label>
        <input matInput type="date" [(ngModel)]="newProduct.expireDate" />
      </mat-form-field>

      <mat-checkbox [(ngModel)]="newProduct.inStock">Raktáron van</mat-checkbox>

      <button mat-flat-button color="primary" (click)="addProduct()">Hozzáadás</button>
    </div>-->

    <table mat-table [dataSource]="products" class="product-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Név</th>
        <td mat-cell *matCellDef="let product">{{ product.name }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Kategória</th>
        <td mat-cell *matCellDef="let product">{{ product.category }}</td>
      </ng-container>

      <ng-container matColumnDef="inStock">
        <th mat-header-cell *matHeaderCellDef>Raktáron</th>
        <td mat-cell *matCellDef="let product">
          <mat-icon color="primary">{{ product.inStock ? 'check_circle' : 'cancel' }}</mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="expireDate">
        <th mat-header-cell *matHeaderCellDef>Lejárat</th>
        <td mat-cell *matCellDef="let product">
          {{ product.expireDate | date: 'yyyy. MMM d.' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Szerkeztés</th>
        <td mat-cell *matCellDef="let product">
          <button mat-icon-button color="accent" aria-label="Szerkesztés">
            <mat-icon>edit</mat-icon>
          </button>
          
        </td>
        
      </ng-container>
      <ng-container matColumnDef="actions1">
        <th mat-header-cell *matHeaderCellDef>Törlés</th>
        <td mat-cell *matCellDef="let task; let i = index">
          <button mat-icon-button color="warn" (click)="deleteTask(i)" aria-label="Delete task">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>


      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
