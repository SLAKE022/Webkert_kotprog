<mat-nav-list> 
  <a mat-list-item routerLink="/home" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>home</mat-icon>
    <span matListItemTitle>Home</span>
  </a>
  <a mat-list-item routerLink="/products" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>inventory_2</mat-icon>
    <span matListItemTitle>Products</span>
  </a>
  @if (isLoggedIn) {
  <a mat-list-item routerLink="/add" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>add</mat-icon>
    <span matListItemTitle>Add</span>
  </a>}
  @if (isLoggedIn) {
  <a mat-list-item routerLink="/update" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>update</mat-icon>
    <span matListItemTitle>Update</span>
  </a>}
  @if (isLoggedIn) {
    <a mat-list-item routerLink="/profile" routerLinkActive="active-list-item" (click)="closeMenu()">
      <mat-icon matListItemIcon>person</mat-icon>
      <span matListItemTitle>Profile</span>
    </a>
  }
  <a mat-list-item routerLink="/signup" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>person</mat-icon>
    <span matListItemTitle>Profile</span>
  </a>  
  @if (!isLoggedIn) {
  <a mat-list-item routerLink="/login" routerLinkActive="active-list-item" (click)="closeMenu()">
    <mat-icon matListItemIcon>person</mat-icon>
    <span matListItemTitle>Profile</span>
  </a>  }
  @if (isLoggedIn) {
    <a mat-list-item (click)="logout()">
      <mat-icon matListItemIcon>logout</mat-icon>
      <span matListItemTitle>Logout</span>
    </a>
  }
</mat-nav-list>
