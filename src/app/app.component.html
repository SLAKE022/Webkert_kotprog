<mat-sidenav-container>
  <mat-sidenav #sidenav>
    <app-menu [sidenav]="sidenav"></app-menu>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar>
      <button 
        mat-button 
        (click)="onToggleSidenav(sidenav)"
        class="menu-toggle-button">
        <mat-icon>menu</mat-icon>
      </button>
      <div>Bio Bolt</div>
      <nav>
        <ul>
          <li><a routerLink="/home">Home</a></li>
          <li><a routerLink="/products">Product</a></li>
          @if (isLoggedIn) {
            <li><a routerLink="/update">Update</a></li>
            <li><a routerLink="/add">Add</a></li>
            <li><a routerLink="/profile">Profile</a></li>
            
            <li><a href="#" (click)="$event.preventDefault(); logout()">Logout</a></li>
          }
          @if (!isLoggedIn) {
            <li><a routerLink="/signup">Signup</a></li>
            <li><a routerLink="/login">Login</a></li>
          }
        </ul>
      </nav>
    </mat-toolbar>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
